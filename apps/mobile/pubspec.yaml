name: hermit_home
description: Hermit-Home Smart Terrarium mobile controller.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ── Networking ──────────────────────────────────────────────────────────────
  http: ^1.2.1

  # ── Secure token storage ────────────────────────────────────────────────────
  # flutter_secure_storage uses Android Keystore / iOS Keychain.
  # Never store JWTs in SharedPreferences — it is plaintext on the filesystem.
  flutter_secure_storage: ^9.2.2

  # ── Icons ───────────────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/warrior_logo.jpg
    - assets/images/download.png
    - assets/images/download1.png
    - assets/images/logo.png

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"