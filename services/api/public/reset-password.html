<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hermit Home - Verify Reset Link</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f8fb;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --primary: #0ea5e9;
        --primary-hover: #0284c7;
        --danger: #dc2626;
        --border: #dbe4ee;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #e0f2fe 0%, var(--bg) 55%);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: var(--text);
        padding: 20px;
      }

      .card {
        width: 100%;
        max-width: 520px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 12px 32px rgba(2, 8, 23, 0.08);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 22px;
      }

      p {
        margin: 0;
        line-height: 1.5;
        color: var(--muted);
      }

      .status {
        margin-top: 14px;
        font-weight: 600;
        color: var(--text);
      }

      .status.error {
        color: var(--danger);
      }

      .actions {
        margin-top: 18px;
        display: none;
        gap: 10px;
        flex-wrap: wrap;
      }

      .account {
        margin-top: 10px;
        color: var(--text);
        font-weight: 600;
      }

      .btn {
        appearance: none;
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 600;
        text-decoration: none;
        cursor: pointer;
      }

      .btn.primary {
        background: var(--primary);
        color: #fff;
      }

      .btn.primary:hover {
        background: var(--primary-hover);
      }

      .btn.ghost {
        background: #f1f5f9;
        color: #0f172a;
      }

      code {
        display: block;
        margin-top: 12px;
        padding: 10px;
        border-radius: 8px;
        background: #f8fafc;
        border: 1px solid var(--border);
        color: #0f172a;
        overflow-wrap: anywhere;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Verifying reset link...</h1>
      <p>
        We will verify this reset link before opening the app.
      </p>
      <p id="status" class="status">Please wait...</p>
      <p id="accountHint" class="account" hidden></p>

      <div class="actions">
        <a id="openAppBtn" class="btn primary" href="#">Open App</a>
        <button id="copyLinkBtn" class="btn ghost" type="button">Copy Link</button>
      </div>

      <code id="deepLinkPreview" aria-live="polite"></code>
    </main>

    <script>
      (function () {
        var statusEl = document.getElementById("status");
        var openAppBtn = document.getElementById("openAppBtn");
        var copyLinkBtn = document.getElementById("copyLinkBtn");
        var deepLinkPreview = document.getElementById("deepLinkPreview");
        var accountHintEl = document.getElementById("accountHint");

        var params = new URLSearchParams(window.location.search);
        var token = (params.get("token") || "").trim();

        function setError(message) {
          statusEl.textContent = message;
          statusEl.classList.add("error");
          openAppBtn.style.display = "none";
          copyLinkBtn.style.display = "none";
          openAppBtn.parentElement.style.display = "none";
          deepLinkPreview.textContent = "";
        }

        if (!token) {
          setError("Invalid reset link: missing token.");
          deepLinkPreview.textContent = "No token found in URL.";
          return;
        }

        var deepLink =
          "hermithome://reset-password?token=" + encodeURIComponent(token);

        copyLinkBtn.addEventListener("click", function () {
          navigator.clipboard
            .writeText(deepLink)
            .then(function () {
              statusEl.textContent = "Deep link copied. Paste into mobile browser if needed.";
              statusEl.classList.remove("error");
            })
            .catch(function () {
              statusEl.textContent = "Cannot copy automatically. Copy from the box below.";
              statusEl.classList.add("error");
            });
        });

        statusEl.textContent = "Checking token and account...";
        statusEl.classList.remove("error");

        fetch("/api/users/validate-reset-token", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
          },
          body: JSON.stringify({ token: token })
        })
          .then(function (response) {
            return response
              .json()
              .catch(function () {
                return {};
              })
              .then(function (body) {
                return { ok: response.ok, body: body };
              });
          })
          .then(function (result) {
            if (!result.ok) {
              var errorMessage =
                result.body && typeof result.body.error === "string"
                  ? result.body.error
                  : "Invalid or expired reset link.";
              setError(errorMessage);
              return;
            }

            openAppBtn.href = deepLink;
            openAppBtn.parentElement.style.display = "flex";
            deepLinkPreview.textContent = deepLink;

            if (
              result.body &&
              typeof result.body.accountHint === "string" &&
              result.body.accountHint.trim()
            ) {
              accountHintEl.textContent = "Account: " + result.body.accountHint.trim();
              accountHintEl.hidden = false;
            }

            statusEl.textContent = "Verified account. Trying to open app...";
            statusEl.classList.remove("error");
            window.location.replace(deepLink);

            setTimeout(function () {
              statusEl.textContent = "If app did not open, tap 'Open App'.";
            }, 1200);
          })
          .catch(function () {
            setError("Cannot verify this reset link now. Please try again.");
          });
      })();
    </script>
  </body>
</html>
