; ================================================================
;  platformio.ini — Smart Terrarium / ESP32
;  Tương thích: PlatformIO IDE (VS Code extension) hoặc CLI
; ================================================================

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; Tốc độ Serial Monitor — khớp với Serial.begin(115200) trong code
monitor_speed = 115200

; Thư mục chứa header tùy chỉnh — cho phép #include "config.h" từ bất kỳ đâu
build_flags = -I include

; Thư viện cần cài — PlatformIO tự tải về
lib_deps =
    adafruit/DHT sensor library @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    claws/BH1750 @ ^1.3.0
    knolleary/PubSubClient @ ^2.8.0
    bblanchon/ArduinoJson @ ^7.0.0
    ; WiFi, Wire, Preferences đã có sẵn trong ESP32 Arduino core